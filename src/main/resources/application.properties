spring.application.name=codesage

# 서버 포트 — Railway는 PORT 환경변수를 자동 주입
server.port=${PORT:8080}

# DB 연결
# Railway는 PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD를 자동 주입
# 로컬 개발: 환경변수 없으면 아래 기본값 사용
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:codesage}
spring.datasource.username=${PGUSER:wonjin}
spring.datasource.password=${PGPASSWORD:wonjin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# API 키 — 반드시 환경변수로 주입 (코드에 직접 입력 금지)
gemini.api-key=${GEMINI_API_KEY}
github.api-token=${GITHUB_API_TOKEN:}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.embedding-model=text-embedding-004
gemini.chat-model=gemini-2.0-flash

analysis.max-files=50
analysis.max-file-size-kb=100

gemini.rate-limit-delay-ms=500

# Actuator — /actuator/health 만 노출, DB 연결 상태 등 세부 정보 숨김
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# 개발: * (전체 허용), 운영: Railway 환경변수 CORS_ALLOWED_ORIGINS에 실제 도메인 설정
# Railway 배포 시: Variables 탭 → CORS_ALLOWED_ORIGINS=https://your-frontend.vercel.app
# 여러 도메인: CORS_ALLOWED_ORIGINS=https://foo.com,https://bar.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}